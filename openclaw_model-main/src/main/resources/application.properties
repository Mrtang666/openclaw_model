spring.application.name=spring-startup-logging
logging.level.com.example.spring=INFO
spring.config.import=optional:file:.evn[.properties],optional:file:../.evn[.properties],optional:file:./openclaw_model-main/.evn[.properties]

ilink.bot.enabled=true
ilink.bot.retry-delay=2s
ilink.bot.typing-indicator-enabled=${ILINK_BOT_TYPING_INDICATOR_ENABLED:true}
ilink.bot.typing-preview-delay=${ILINK_BOT_TYPING_PREVIEW_DELAY:600ms}
ilink.bot.model-error-reply=\u62B1\u6B49\uFF0C\u5904\u7406\u6D88\u606F\u65F6\u51FA\u73B0\u9519\u8BEF\uFF0C\u8BF7\u7A0D\u540E\u518D\u8BD5\u3002
ilink.bot.lock-file=${ILINK_BOT_LOCK_FILE:${user.home}/.openclaw-model/wechat-ilink.lock}

bailian.api-key=${BAILIAN_API_KEY:${DASHSCOPE_API_KEY:}}
bailian.compatible-base-url=${BAILIAN_COMPATIBLE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
bailian.chat-model=${BAILIAN_CHAT_MODEL:qwen-plus}
bailian.vision-model=${BAILIAN_VISION_MODEL:qwen3-vl-plus}
bailian.image-model=${BAILIAN_IMAGE_MODEL:wanx-v1}
bailian.image-edit-model=${BAILIAN_IMAGE_EDIT_MODEL:qwen-image-2.0}
bailian.image-edit-url=${BAILIAN_IMAGE_EDIT_URL:}
bailian.image-synthesis-url=${BAILIAN_IMAGE_SYNTHESIS_URL:https://dashscope.aliyuncs.com/api/v1/services/aigc/text2image/image-synthesis}
bailian.task-url=${BAILIAN_TASK_URL:https://dashscope.aliyuncs.com/api/v1/tasks}
bailian.image-size=${BAILIAN_IMAGE_SIZE:1024*1024}
bailian.connect-timeout=10s
bailian.request-timeout=90s
bailian.image-timeout=3m
bailian.image-poll-interval=2s

weather.api-host=${WEATHER_API_HOST:https://devapi.qweather.com}
weather.api-key=${WEATHER_API_KEY:}
weather.connect-timeout=5s
weather.request-timeout=15s

memory.enabled=true
memory.data-directory=${MEMORY_DATA_DIRECTORY:runtime-data}
memory.max-entries-per-user=${MEMORY_MAX_ENTRIES_PER_USER:40}
memory.prompt-entries=${MEMORY_PROMPT_ENTRIES:12}
memory.max-images-per-user=${MEMORY_MAX_IMAGES_PER_USER:12}
memory.max-image-bytes-per-user=${MEMORY_MAX_IMAGE_BYTES_PER_USER:52428800}
