spring.application.name=openclaw-cli
spring.config.import=optional:file:.env[.properties]
spring.main.web-application-type=none
spring.main.banner-mode=off
app.version=@project.version@
amap.weather.key=${AMAP_WEATHER_KEY:}
amap.weather.base-url=https://restapi.amap.com
dashscope.api-key=${DASHSCOPE_API_KEY:}
dashscope.base-url=https://ws-6gncy95g9skiwjfi.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
dashscope.model=qwen3.7-plus
dashscope.vision-model=qwen3.7-plus
dashscope.enable-thinking=true
dashscope.image-base-url=${DASHSCOPE_IMAGE_BASE_URL:https://ws-6gncy95g9skiwjfi.cn-beijing.maas.aliyuncs.com/api/v1}
dashscope.image-model=qwen-image-2.0-pro
dashscope.image-size=1024*1024
dashscope.image-watermark=false
dashscope.image-prompt-extend=true
image.output-dir=${IMAGE_OUTPUT_DIR:generated-images}
logging.level.root=WARN
