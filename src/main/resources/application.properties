spring.application.name=openclaw-cli
spring.config.import=optional:file:.env[.properties]
spring.main.web-application-type=servlet
spring.main.banner-mode=off
app.version=@project.version@
server.address=${WECHAT_LOGIN_SERVER_ADDRESS:127.0.0.1}
server.port=${WECHAT_LOGIN_SERVER_PORT:0}

# =========================
# WeChat login page
# =========================
wechat.login-page.base-url=${WECHAT_LOGIN_PAGE_BASE_URL:}
wechat.login-page.session-ttl=${WECHAT_LOGIN_SESSION_TTL:10m}

# =========================
# ClawBot multi-client and message concurrency
# =========================
clawbot.max-connections=${CLAWBOT_MAX_CONNECTIONS:10}
clawbot.max-pending-logins=${CLAWBOT_MAX_PENDING_LOGINS:3}
wechat.concurrency.worker-threads=${WECHAT_WORKER_THREADS:8}
wechat.concurrency.model-max-concurrency=${WECHAT_MODEL_MAX_CONCURRENCY:6}
wechat.concurrency.user-queue-capacity=${WECHAT_USER_QUEUE_CAPACITY:5}
wechat.concurrency.global-queue-capacity=${WECHAT_GLOBAL_QUEUE_CAPACITY:100}
wechat.concurrency.task-timeout=${WECHAT_TASK_TIMEOUT:180s}
wechat.concurrency.user-mailbox-idle=${WECHAT_USER_MAILBOX_IDLE:10m}

# =========================
# MySQL / Flyway
# =========================
spring.datasource.url=${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/openclaw?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration

# =========================
# Agent tool calling mode
# prompt-json      = legacy JSON planner
# function-calling = standard OpenAI-compatible tool calling loop
# =========================
agent.tool-calling.mode=${AGENT_TOOL_CALLING_MODE:function-calling}
agent.tool-calling.max-loop-rounds=${AGENT_TOOL_CALLING_MAX_LOOP_ROUNDS:5}

# =========================
# WeChat memory
# =========================
wechat.memory.session-idle-minutes=${WECHAT_MEMORY_SESSION_IDLE_MINUTES:60}
wechat.memory.raw-retention-days=${WECHAT_MEMORY_RAW_RETENTION_DAYS:30}
wechat.memory.recent-turn-limit=${WECHAT_MEMORY_RECENT_TURN_LIMIT:10}
wechat.memory.rolling-summary-turn-threshold=${WECHAT_MEMORY_ROLLING_SUMMARY_TURN_THRESHOLD:20}
wechat.memory.summary-maintenance-initial-delay-ms=${WECHAT_MEMORY_SUMMARY_MAINTENANCE_INITIAL_DELAY_MS:60000}
wechat.memory.summary-maintenance-delay-ms=${WECHAT_MEMORY_SUMMARY_MAINTENANCE_DELAY_MS:300000}

# =========================
# Weather
# =========================
amap.weather.key=${AMAP_WEATHER_KEY:}
amap.weather.base-url=${AMAP_WEATHER_BASE_URL:https://restapi.amap.com}

# =========================
# Map
# AMAP_MAP_KEY can use the same Web service key as AMAP_WEATHER_KEY.
# =========================
amap.map.key=${AMAP_MAP_KEY:${AMAP_WEATHER_KEY:}}
amap.map.base-url=${AMAP_MAP_BASE_URL:https://restapi.amap.com}
amap.map.static-image-enabled=${AMAP_MAP_STATIC_IMAGE_ENABLED:true}

# =========================
# DashScope common / chat
# Keep openclaw.* aliases for compatibility with existing code.
# =========================
dashscope.api-key=${DASHSCOPE_API_KEY:}
dashscope.base-url=${DASHSCOPE_BASE_URL:}
openclaw.dashscope.model=${OPENCLAW_DASHSCOPE_MODEL:qwen3.7-max-2026-06-08}
dashscope.model=${DASHSCOPE_CHAT_MODEL:${openclaw.dashscope.model}}
dashscope.enable-thinking=${DASHSCOPE_ENABLE_THINKING:true}

# =========================
# Knowledge base / Qdrant / Embedding
# =========================
qdrant.host=${QDRANT_HOST:localhost}
qdrant.http-port=${QDRANT_HTTP_PORT:6333}
qdrant.api-key=${QDRANT_API_KEY:}
qdrant.collection=${QDRANT_COLLECTION:openclaw_knowledge}
qdrant.distance=${QDRANT_DISTANCE:Cosine}
qdrant.vector-size=${QDRANT_VECTOR_SIZE:0}
knowledge.chunk-size=${KNOWLEDGE_CHUNK_SIZE:800}
knowledge.chunk-overlap=${KNOWLEDGE_CHUNK_OVERLAP:120}
knowledge.top-k=${KNOWLEDGE_TOP_K:5}
knowledge.max-context-chars=${KNOWLEDGE_MAX_CONTEXT_CHARS:6000}
knowledge.min-score=${KNOWLEDGE_MIN_SCORE:0.2}
dashscope.embedding.model=${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
dashscope.embedding.base-url=${DASHSCOPE_EMBEDDING_BASE_URL:${dashscope.base-url}}
dashscope.embedding.api-key=${DASHSCOPE_EMBEDDING_API_KEY:${dashscope.api-key}}

# =========================
# Web reading / search
# =========================
web.read.timeout-ms=${WEB_READ_TIMEOUT_MS:10000}
web.read.max-bytes=${WEB_READ_MAX_BYTES:2097152}
web.cache.ttl-hours=${WEB_CACHE_TTL_HOURS:24}
web.search.provider=${WEB_SEARCH_PROVIDER:none}
web.search.endpoint=${WEB_SEARCH_ENDPOINT:https://dashscope.aliyuncs.com/api/v1/mcps/WebSearch/mcp}
web.search.api-key=${WEB_SEARCH_API_KEY:${dashscope.api-key}}
web.search.limit=${WEB_SEARCH_LIMIT:5}

# =========================
# DashScope vision / image generation
# =========================
dashscope.vision-model=${DASHSCOPE_VISION_MODEL:qwen3.7-plus}
dashscope.image-base-url=${DASHSCOPE_IMAGE_BASE_URL:}
openclaw.dashscope.image-model=${OPENCLAW_DASHSCOPE_IMAGE_MODEL:qwen-image-2.0-pro}
dashscope.image-model=${DASHSCOPE_IMAGE_MODEL:${openclaw.dashscope.image-model}}
dashscope.image-size=${DASHSCOPE_IMAGE_SIZE:1024*1024}
dashscope.image-watermark=${DASHSCOPE_IMAGE_WATERMARK:false}
dashscope.image-prompt-extend=${DASHSCOPE_IMAGE_PROMPT_EXTEND:true}
image.output-dir=${IMAGE_OUTPUT_DIR:generated-images}
wechat.image.storage-dir=${WECHAT_IMAGE_STORAGE_DIR:data/wechat/images}
wechat.image.batch-size=${WECHAT_IMAGE_BATCH_SIZE:5}
wechat.document.storage-dir=${WECHAT_DOCUMENT_STORAGE_DIR:data/wechat/documents}

# =========================
# DashScope ASR / TTS
# =========================
dashscope.voice-base-url=${DASHSCOPE_VOICE_BASE_URL:${dashscope.base-url}}
dashscope.voice-model=${DASHSCOPE_VOICE_MODEL:qwen3-asr-flash}
dashscope.voice-max-poll-attempts=${DASHSCOPE_VOICE_MAX_POLL_ATTEMPTS:20}
dashscope.voice-poll-interval-ms=${DASHSCOPE_VOICE_POLL_INTERVAL_MS:1000}
dashscope.tts-base-url=${DASHSCOPE_TTS_BASE_URL:}
openclaw.dashscope.tts-model=${OPENCLAW_DASHSCOPE_TTS_MODEL:qwen3-tts-flash}
dashscope.tts-model=${DASHSCOPE_TTS_MODEL:${openclaw.dashscope.tts-model}}
dashscope.tts-voice=${DASHSCOPE_TTS_VOICE:Cherry}
dashscope.tts-format=${DASHSCOPE_TTS_FORMAT:mp3}
voice.tts.max-wechat-duration-ms=${VOICE_TTS_MAX_WECHAT_DURATION_MS:58000}
voice.tts.sample-rate=${VOICE_TTS_SAMPLE_RATE:16000}
voice.tts.estimated-chars-per-second=${VOICE_TTS_ESTIMATED_CHARS_PER_SECOND:4.0}
audio.ffmpeg.path=${AUDIO_FFMPEG_PATH:ffmpeg}
audio.ffmpeg.enabled=${AUDIO_FFMPEG_ENABLED:true}
audio.ffmpeg.timeout-seconds=${AUDIO_FFMPEG_TIMEOUT_SECONDS:20}

# =========================
# Logging
# =========================
logging.level.root=${LOGGING_LEVEL_ROOT:WARN}
logging.level.com.example.spring.wechat=${LOGGING_LEVEL_WECHAT:INFO}
logging.level.com.example.spring.wechat.bot.WechatBotService=${LOGGING_LEVEL_WECHAT_BOT:DEBUG}
logging.level.com.example.spring.wechat.conversation.WechatConversationService=${LOGGING_LEVEL_WECHAT_CONVERSATION:DEBUG}
logging.level.com.example.spring.wechat.adapter.ilink.IlinkWechatClient=${LOGGING_LEVEL_ILINK:INFO}
