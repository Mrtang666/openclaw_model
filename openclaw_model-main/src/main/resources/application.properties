spring.application.name=openclaw-cli
spring.config.import=optional:file:.env[.properties]
spring.main.web-application-type=none
spring.main.banner-mode=off
app.version=@project.version@
spring.datasource.url=${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/openclaw?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
wechat.memory.session-idle-minutes=60
wechat.memory.raw-retention-days=30
wechat.memory.recent-turn-limit=10
wechat.memory.rolling-summary-turn-threshold=20
wechat.memory.summary-maintenance-delay-ms=300000
wechat.memory.summary-maintenance-initial-delay-ms=60000
amap.weather.key=${AMAP_WEATHER_KEY:}
amap.weather.base-url=https://restapi.amap.com
dashscope.api-key=${DASHSCOPE_API_KEY:}
dashscope.base-url=https://ws-6gncy95g9skiwjfi.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
openclaw.dashscope.model=qwen3.7-max-2026-06-08
dashscope.model=qwen3.7-max-2026-06-08
dashscope.vision-model=qwen3.7-plus
dashscope.enable-thinking=true
dashscope.image-base-url=${DASHSCOPE_IMAGE_BASE_URL:https://ws-6gncy95g9skiwjfi.cn-beijing.maas.aliyuncs.com/api/v1}
openclaw.dashscope.image-model=qwen-image-2.0-pro
dashscope.image-model=qwen-image-2.0-pro
dashscope.image-size=1024*1024
dashscope.image-watermark=false
dashscope.image-prompt-extend=true
dashscope.voice-base-url=${DASHSCOPE_VOICE_BASE_URL:${dashscope.base-url}}
dashscope.voice-model=${DASHSCOPE_VOICE_MODEL:qwen3-asr-flash}
dashscope.voice-max-poll-attempts=${DASHSCOPE_VOICE_MAX_POLL_ATTEMPTS:20}
dashscope.voice-poll-interval-ms=${DASHSCOPE_VOICE_POLL_INTERVAL_MS:1000}
dashscope.tts-base-url=${DASHSCOPE_TTS_BASE_URL:https://dashscope.aliyuncs.com/api/v1}
openclaw.dashscope.tts-model=qwen3-tts-flash
dashscope.tts-model=qwen3-tts-flash
dashscope.tts-voice=${DASHSCOPE_TTS_VOICE:Cherry}
dashscope.tts-format=${DASHSCOPE_TTS_FORMAT:mp3}
voice.tts.max-wechat-duration-ms=${VOICE_TTS_MAX_WECHAT_DURATION_MS:58000}
voice.tts.sample-rate=${VOICE_TTS_SAMPLE_RATE:16000}
voice.tts.estimated-chars-per-second=${VOICE_TTS_ESTIMATED_CHARS_PER_SECOND:4.0}
audio.ffmpeg.path=${AUDIO_FFMPEG_PATH:ffmpeg}
audio.ffmpeg.enabled=${AUDIO_FFMPEG_ENABLED:true}
audio.ffmpeg.timeout-seconds=${AUDIO_FFMPEG_TIMEOUT_SECONDS:20}
image.output-dir=${IMAGE_OUTPUT_DIR:generated-images}
logging.level.root=WARN
logging.level.com.example.spring.wechat=INFO
logging.level.com.example.spring.wechat.bot.WechatBotService=DEBUG
logging.level.com.example.spring.wechat.conversation.WechatConversationService=DEBUG
logging.level.com.example.spring.wechat.client.IlinkWechatClient=INFO
